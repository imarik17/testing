<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Directory - Login</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1a30;
            margin: 0;
            padding: 20px;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .card {
            background: #112240; 
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 400px; 
            text-align: center;
        }
        .app-container {
            max-width: 1200px;
            width: 100%;
            padding: 30px;
            display: none; 
            align-items: flex-start;
        }

        h2 { margin-top: 0; color: #ffffff; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #e2e8f0; text-align: left; font-size: 14px;}
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; background-color: #0b1a30; color: #ffffff;
            border: 1px solid #4a5568; border-radius: 4px; box-sizing: border-box;
            font-size: 14px; margin-bottom: 20px;
        }
        input:focus { border-color: #63b3ed; outline: none; }
        button {
            width: 100%; padding: 12px; background-color: #3498db; color: white;
            border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold;
        }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #4a5568; cursor: not-allowed; }

        .error-msg { color: #e74c3c; font-size: 14px; margin-bottom: 15px; display: none; }

        .control-group { background: #1a365d; padding: 15px; border: 1px solid #2a4365; border-radius: 6px; margin-bottom: 25px; text-align: left;}
        .search-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; text-align: left;}
        th, td { border: 1px solid #2a4365; padding: 12px; }
        th { background-color: #2b6cb0; position: sticky; top: 0; }
        tr { background-color: #112240; }
        tr:nth-child(even) { background-color: #1e3a5f; }
        tr:hover { background-color: #2c5282; }
        a { color: #63b3ed; text-decoration: none; }
        
        .author-credit { position: fixed; bottom: 15px; right: 20px; font-size: 14px; color: #a0aec0; font-style: italic; opacity: 0.8; }
        .loader { border: 4px solid #1a365d; border-top: 4px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 0 auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loginScreen" class="card">
        <h2>CBIC Directory Login</h2>
        <div id="loginError" class="error-msg">Invalid credentials.</div>
        <label>Email ID</label>
        <input type="text" id="emailInput" placeholder="Enter your email">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="Enter password">
        <button id="loginBtn" onclick="attemptLogin()">Login</button>
        <div id="loginLoader" class="loader" style="margin-top: 15px;"></div>
    </div>

    <div id="changePasswordScreen" class="card" style="display: none;">
        <h2>Action Required</h2>
        <p style="font-size: 14px; color: #cbd5e0; margin-bottom: 20px;">For security, please change your default password.</p>
        <div id="pwdError" class="error-msg">Passwords do not match.</div>
        <label>New Password</label>
        <input type="password" id="newPwd1" placeholder="Enter new password">
        <label>Confirm New Password</label>
        <input type="password" id="newPwd2" placeholder="Confirm new password">
        <button id="changePwdBtn" onclick="changePassword()">Update Password</button>
        <div id="pwdLoader" class="loader" style="margin-top: 15px;"></div>
    </div>

    <div id="appScreen" class="card app-container">
        <h2>CBIC Officer Directory</h2>
        
        <div class="control-group">
            <div class="search-grid">
                <div><label>Search Name:</label><input type="text" id="nameSearch" disabled></div>
                <div><label>Search Commissionerate:</label><input type="text" id="commSearch" disabled></div>
                <div><label>Search Designation:</label><input type="text" id="desigSearch" disabled></div>
            </div>
            <div id="statusText" style="color: #63b3ed; margin-top: 15px; font-size: 14px; font-weight: bold;">Authenticating...</div>
        </div>

        <table id="resultsTable">
            <thead>
                <tr>
                    <th>S.No.</th><th>Full Name</th><th>Designation</th><th>Commissionerate</th><th>Phone Number</th><th>Email</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="6" style="text-align: center; color: #a0aec0;">Data will load automatically after login.</td></tr>
            </tbody>
        </table>
    </div>

    <div class="author-credit">by krish</div>

    <script>
        // ==========================================
        // 1. PASTE YOUR GOOGLE APPS SCRIPT URL HERE:
        // ==========================================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHSogDA4BWncIll4sZzTivDCEZaLkr9IJYILMIp2mQ1uhZ4Us8txEN-kJxXcgoZxu_yw/exec";
        
        // ==========================================
        // 2. PASTE YOUR DIRECT CSV DOWNLOAD URL HERE:
        // ==========================================
        const CSV_URL = "officers.csv";
        
        let currentUserEmail = "";

        // --- AUTHENTICATION LOGIC ---
        async function attemptLogin() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');
            const loader = document.getElementById('loginLoader');

            if(!email || !password) { errorDiv.innerText = "Please enter both fields."; errorDiv.style.display = "block"; return; }

            errorDiv.style.display = "none"; btn.disabled = true; loader.style.display = "block";

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', email: email, password: password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    currentUserEmail = email;
                    document.getElementById('loginScreen').style.display = "none";
                    document.body.style.alignItems = "flex-start";

                    if (result.isFirstLogin) {
                        document.body.style.alignItems = "center";
                        document.getElementById('changePasswordScreen').style.display = "block";
                    } else {
                        document.getElementById('appScreen').style.display = "block";
                        loadCSVData(); // Auto-load data here!
                    }
                } else {
                    errorDiv.innerText = result.message || "Invalid credentials.";
                    errorDiv.style.display = "block";
                }
            } catch (error) {
                errorDiv.innerText = "Network error. Check Apps Script URL.";
                errorDiv.style.display = "block";
            }

            btn.disabled = false; loader.style.display = "none";
        }

        async function changePassword() {
            const p1 = document.getElementById('newPwd1').value;
            const p2 = document.getElementById('newPwd2').value;
            const errorDiv = document.getElementById('pwdError');
            const btn = document.getElementById('changePwdBtn');
            const loader = document.getElementById('pwdLoader');

            if(p1.length < 5) { errorDiv.innerText = "Password too short."; errorDiv.style.display = "block"; return; }
            if(p1 !== p2) { errorDiv.innerText = "Passwords do not match."; errorDiv.style.display = "block"; return; }

            errorDiv.style.display = "none"; btn.disabled = true; loader.style.display = "block";

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'changePassword', email: currentUserEmail, newPassword: p1 })
                });
                const result = await response.json();

                if(result.success) {
                    document.getElementById('changePasswordScreen').style.display = "none";
                    document.body.style.alignItems = "flex-start";
                    document.getElementById('appScreen').style.display = "block";
                    loadCSVData(); // Auto-load data here!
                }
            } catch(error) {
                errorDiv.innerText = "Failed to update password."; errorDiv.style.display = "block";
            }
            btn.disabled = false; loader.style.display = "none";
        }

        // --- DIRECTORY LOGIC ---
        let officersData = []; 
        const nameInput = document.getElementById('nameSearch');
        const commInput = document.getElementById('commSearch');
        const desigInput = document.getElementById('desigSearch');
        const statusText = document.getElementById('statusText');

        // Function to automatically fetch the CSV from the internet
        function loadCSVData() {
            statusText.innerText = "Downloading directory database... Please wait.";

            Papa.parse(CSV_URL, {
                download: true, // Tells PapaParse to fetch from URL
                header: true, 
                skipEmptyLines: true,
                complete: function(results) {
                    officersData = results.data;
                    nameInput.disabled = false; commInput.disabled = false; desigInput.disabled = false;
                    nameInput.focus();
                    statusText.innerText = `Successfully loaded ${officersData.length} records. Showing top 100 entries.`;
                    displayData(officersData.slice(0, 100));
                },
                error: function(err) {
                    statusText.innerText = "Error downloading data. Please check the CSV URL.";
                    statusText.style.color = "#e74c3c";
                    console.error(err);
                }
            });
        }

        function filterResults() {
            const nTerm = nameInput.value.toLowerCase().trim();
            const cTerm = commInput.value.toLowerCase().trim();
            const dTerm = desigInput.value.toLowerCase().trim();
            
            let filtered = officersData.filter(off => {
                const n = (off['Full_Name'] || '').toLowerCase();
                const c = (off['Commissionerate_or_ZU'] || '').toLowerCase();
                const d = (off['Designation'] || '').toLowerCase();
                return (nTerm === '' || n.includes(nTerm)) && (cTerm === '' || c.includes(cTerm)) && (dTerm === '' || d.includes(dTerm));
            });

            if (nTerm || cTerm || dTerm) {
                filtered.sort((a, b) => {
                    let sA = 0, sB = 0;
                    if(nTerm && (a['Full_Name']||'').toLowerCase().startsWith(nTerm)) sA++;
                    if(nTerm && (b['Full_Name']||'').toLowerCase().startsWith(nTerm)) sB++;
                    if(cTerm && (a['Commissionerate_or_ZU']||'').toLowerCase().startsWith(cTerm)) sA++;
                    if(cTerm && (b['Commissionerate_or_ZU']||'').toLowerCase().startsWith(cTerm)) sB++;
                    if(dTerm && (a['Designation']||'').toLowerCase().startsWith(dTerm)) sA++;
                    if(dTerm && (b['Designation']||'').toLowerCase().startsWith(dTerm)) sB++;
                    return sB - sA; 
                });
            }

            statusText.innerText = `Found ${filtered.length} matching records. (Showing top 100)`;
            displayData(filtered.slice(0, 100));
        }

        nameInput.addEventListener('input', filterResults);
        commInput.addEventListener('input', filterResults);
        desigInput.addEventListener('input', filterResults);

        function displayData(data) {
            const tbody = document.querySelector('#resultsTable tbody');
            tbody.innerHTML = ''; 
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No records found.</td></tr>'; return;
            }
            data.forEach((off, i) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${off['SN'] || i + 1}</td>
                    <td><strong>${off['Full_Name'] || 'N/A'}</strong></td>
                    <td>${off['Designation'] || 'N/A'}</td>
                    <td>${off['Commissionerate_or_ZU'] || 'N/A'}</td>
                    <td><a href="tel:${off['Phone_Number']}">${off['Phone_Number'] || 'N/A'}</a></td>
                    <td><a href="mailto:${off['Email']}">${off['Email'] || 'N/A'}</a></td>
                `;
                tbody.appendChild(row);
            });
        }
    </script>
</body>
</html>
